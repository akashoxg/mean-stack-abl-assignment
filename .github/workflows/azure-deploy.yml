name: Deploy MEAN Stack App to Azure

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install & Build Frontend (Angular)
        run: |
          cd frontend
          npm ci
          npx ng build --configuration production
        # This creates the frontend build artifacts in frontend/dist/frontend/browser

      - name: Install Backend Dependencies & Copy Frontend
        run: |
          cd backend
          npm ci
          # Create a public folder and copy angular build files to serve them via Express
          mkdir -p public
          cp -r ../frontend/dist/frontend/browser/* ./public/

      - name: Zip the application for deployment
        run: |
          cd backend
          zip -r ../backend-deploy.zip ./*

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'mean-task-manager'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: backend-deploy.zip
